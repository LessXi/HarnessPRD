schema: spec-driven

# 项目上下文（可选）
# 创建工件时会展示给 AI 参考
# 可添加技术栈、约定、风格指南、领域知识等
context: |
  语言：中文
  用中文撰写所有文档，但：
   - 技术术语如 "API", "REST", "GraphQL", "SSE", "LLM" 保持英文
   - 代码示例和文件路径保持英文

  技术栈：
   - 前端：React 18 + Vite 5 + TypeScript + Tailwind 3 + shadcn/ui
   - 后端：Python 3.11 + FastAPI + LangChain 0.3 + SSE
   - LLM：OpenAI / Anthropic / DeepSeek（通过 LangChain Provider）

  项目约定：
   - 无数据库、无认证、无 Redis、开发阶段无 Docker
   - 路由结构：`/form`、`/chat/<id>`、`/generate/{prd,api,prompts}/<id>`
   - 表单数据模型定义在 `docs/form-data-structure.md`
   - 优先级标记定义在 `docs/features.md`：P0（必须有）、P1（重要）、P2（锦上添花）
   - shadcn/ui 组件复制到仓库内（非 npm 依赖），基于 Radix UI 原语
   - API 和代码标识符用英文；UI 标签可用中文或英文
   - 前端 TypeScript 类型应与 Pydantic 模型字段名保持一致
   - dotenv 不入库 — `.env` 已在 `.gitignore` 中；使用 `.env.example` 作为文档

  领域：AI 驱动的对话式需求工作台

# 每工件规则（可选）
# 为特定工件类型添加自定义规则
rules:
  proposal:
    - 提案保持简洁，不超过 500 字
    - 必须包含“非目标”部分
    - 明确说明对现有系统的影响
  tasks:
    - 将任务分解为最多 2 小时的块
    - 每个任务必须有明确的验收标准
    - 标记任务优先级：P0（必须有）、P1（重要）、P2（锦上添花）
